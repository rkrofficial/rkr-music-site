<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKR</title>
    <meta name="description" content="RKR – Producer & DJ based in New York.">
    <link rel="icon" type="image/jpeg" href="./rkr.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --cream: #F0EBE0;
            --gold: #C9A84C;
            --gold-dim: rgba(201, 168, 76, 0.4);
            --dim: #555;
            --faint: #222;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--cream);
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            overflow: hidden;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
            z-index: 100;
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            padding: 2rem;
            position: relative;
        }

        /* Logo */
        .logo {
            width: clamp(120px, 22vw, 180px);
            height: auto;
            mix-blend-mode: lighten;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        /* Name */
        .name {
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.45em;
            margin-top: 1.4rem;
            text-indent: 0.45em;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        /* Gold rule */
        .rule {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin-top: 1.2rem;
            opacity: 0;
            animation: fadeScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        /* Descriptor */
        .descriptor {
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-indent: 0.35em;
            color: var(--cream);
            font-weight: 500;
            margin-top: 1rem;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 2.2rem;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.6rem;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .btn-primary {
            background: var(--cream);
            color: var(--bg);
        }

        .btn-primary:hover {
            background: var(--gold);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.15);
        }

        .btn-outline {
            background: transparent;
            color: var(--cream);
            border: 1px solid rgba(240, 235, 224, 0.25);
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-1px);
        }

        /* SVG icons inside buttons */
        .btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .btn-primary svg {
            fill: var(--bg);
        }

        .btn-primary:hover svg {
            fill: var(--bg);
        }

        .btn-outline svg {
            fill: var(--cream);
            transition: fill 0.35s;
        }

        .btn-outline:hover svg {
            fill: var(--gold);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
        }

        .footer a {
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: var(--cream);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.35s;
        }

        .footer a:hover {
            color: var(--gold);
            text-decoration: none;
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scaleX(0);
            }
            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .buttons {
                flex-direction: column;
                width: 100%;
                max-width: 220px;
                gap: 0.6rem;
            }

            .btn {
                justify-content: center;
                padding: 0.7rem 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">

        <h1 class="name">RKR</h1>

        <div class="rule"></div>
